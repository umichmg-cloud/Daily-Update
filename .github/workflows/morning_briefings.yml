name: Daily Morning Briefing

on:
  schedule:
    # 07:00 UTC = 09:00 AM Rotterdam (CEST) / 02:00 AM Ciudad de México (CDT)
    - cron: '0 7 * * *'
  workflow_dispatch: # Botón manual para probar cuando quieras

permissions:
  contents: write   # Vital para poder guardar el historial .json en el repo

jobs:
  run-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Usamos fetch-depth: 0 para que git tenga todo el historial y pueda hacer el rebase
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai feedparser beautifulsoup4 requests

      - name: Restore seen-news history
        run: |
          if [ -f morning_briefing_seen.json ]; then
            cp morning_briefing_seen.json ~/.morning_briefing_seen.json
            echo "Historial restaurado"
          else
            echo "Sin historial previo, empezando desde cero"
          fi

      - name: Run Morning Briefing
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GMAIL_FROM:         ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:           ${{ secrets.GMAIL_TO }}
        run: python morning_briefing.py

      - name: Save seen-news history back to repo
        run: |
          if [ -f ~/.morning_briefing_seen.json ]; then
            cp ~/.morning_briefing_seen.json morning_briefing_seen.json
          fi

      - name: Commit and push history update
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # EVITA EL ERROR DE REJECTED:
          # Trae cualquier cambio manual que hayas hecho en la web antes de subir el JSON
          git pull --rebase origin main
          
          git add morning_briefing_seen.json
          # Solo hace commit si el archivo cambió realmente
          git diff --staged --quiet || (git commit -m "chore: update seen news history [skip ci]" && git push origin main)
