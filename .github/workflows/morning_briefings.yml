name: Daily Morning Briefing

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen-news history
        run: |
          if [ -f morning_briefing_seen.json ]; then
            cp morning_briefing_seen.json ~/.morning_briefing_seen.json
            echo "Historial restaurado"
          else
            echo "Sin historial previo"
          fi

      - name: Run Morning Briefing
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GMAIL_FROM:         ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:           ${{ secrets.GMAIL_TO }}
        run: python morning_briefing.py

      - name: Save seen-news history back to repo
        run: |
          if [ -f ~/.morning_briefing_seen.json ]; then
            cp ~/.morning_briefing_seen.json morning_briefing_seen.json
          fi

      - name: Commit and push history update
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add morning_briefing_seen.json

          if git diff --staged --quiet; then
            echo "Sin cambios que guardar."
            exit 0
          fi

          git commit -m "chore: update seen news history [skip ci]"

          for i in $(seq 1 5); do
            git pull --rebase origin main && git push origin main && break
            echo "Intento $i fallido. Reintentando en 5s..."
            sleep 5
          done
