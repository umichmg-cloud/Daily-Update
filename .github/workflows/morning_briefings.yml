name: Daily Morning Briefing

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: daily-briefing
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai feedparser beautifulsoup4 requests

      - name: Restore history
        run: |
          if [ -f morning_briefing_seen.json ]; then
            cp morning_briefing_seen.json ~/.morning_briefing_seen.json
          fi

      - name: Run Morning Briefing
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GMAIL_FROM:         ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:           ${{ secrets.GMAIL_TO }}
        run: python morning_briefing.py

      - name: Commit and push history update
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 1. Mover el archivo generado al repositorio local
          if [ -f ~/.morning_briefing_seen.json ]; then
            cp ~/.morning_briefing_seen.json morning_briefing_seen.json
          fi
          
          # 2. Añadir al área de preparación (Stage)
          git add morning_briefing_seen.json

          # 3. Hacer el commit local para que el área de trabajo esté "limpia"
          if git diff --staged --quiet; then
            echo "Sin noticias nuevas hoy."
            exit 0
          fi
          git commit -m "chore: update seen news history [skip ci]"

          # 4. Ahora que no hay "unstaged changes", el pull --rebase funcionará
          for i in {1..5}; do
            git pull --rebase origin main && git push origin main && break
            echo "Colisión detectada con el remoto, reintentando en 5s..."
            sleep 5
          done
