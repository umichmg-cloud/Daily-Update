name: Daily Morning Briefing

on:
  schedule:
    # 07:00 UTC = 09:00 AM Rotterdam (CEST)
    - cron: '0 7 * * *'
  workflow_dispatch:

# Evita que dos ejecuciones intenten escribir en el repo al mismo tiempo
concurrency:
  group: daily-briefing
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai feedparser beautifulsoup4 requests

      - name: Restore seen-news history
        run: |
          if [ -f morning_briefing_seen.json ]; then
            cp morning_briefing_seen.json ~/.morning_briefing_seen.json
            echo "Historial restaurado"
          fi

      - name: Run Morning Briefing
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GMAIL_FROM:         ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:           ${{ secrets.GMAIL_TO }}
        run: python morning_briefing.py

      - name: Save seen-news history back to repo
        run: |
          if [ -f ~/.morning_briefing_seen.json ]; then
            cp ~/.morning_briefing_seen.json morning_briefing_seen.json
          fi

      - name: Commit and push history update
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Sincronización inmediata antes de preparar el commit
          git pull --rebase origin main

          git add morning_briefing_seen.json

          # Solo proceder si hubo noticias nuevas hoy
          if git diff --staged --quiet; then
            echo "Sin cambios que guardar en el historial."
            exit 0
          fi

          git commit -m "chore: update seen news history [skip ci]"
          git push origin main
