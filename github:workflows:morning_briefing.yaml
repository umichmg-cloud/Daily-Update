name: Daily Morning Briefing

on:
  schedule:
    # 07:00 UTC = 09:00 AM Rotterdam (CEST)
    - cron: '0 7 * * *'
  workflow_dispatch: # Botón manual para probarlo cuando quieras

jobs:
  run-briefing:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai feedparser beautifulsoup4 requests

    - name: Run Morning Briefing Script
      env:
        # Estos nombres deben coincidir EXACTAMENTE con tus GitHub Secrets
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        GMAIL_TO: ${{ secrets.GMAIL_TO }}
      run: python morning_briefing.py

    # PASO OPCIONAL: Guardar historial para no repetir noticias mañana
    - name: Commit and push history update
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add .morning_briefing_seen.json || exit 0
        git commit -m "Update seen news history [skip ci]" || exit 0
        git push